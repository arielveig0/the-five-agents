<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>המלצות וידאו | חכמת האוטומציה</title>
  <meta name="description" content="לקוחות מספרים איך האוטומציה שינתה להם את העסק — המלצות וידאו אמיתיות.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&family=Heebo:wght@700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #252E62;
      --teal: #5BC0D3;
      --teal-text: #1B7A8C;
      --white: #fff;
      --light: #F4F6FA;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Assistant', sans-serif;
      background: var(--light);
      color: var(--navy);
      direction: rtl;
      min-height: 100vh;
    }

    /* ── Header ── */
    .vt-header {
      background: var(--white);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .vt-back {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--navy);
      font-family: 'Heebo', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .vt-back svg {
      width: 20px;
      height: 20px;
    }
    .vt-logo {
      height: 40px;
      width: auto;
    }

    /* ── Page content ── */
    .vt-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    .vt-title {
      font-family: 'Heebo', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
    }
    .vt-subtitle {
      text-align: center;
      font-size: 0.92rem;
      color: rgba(37,46,98,0.6);
      margin-bottom: 32px;
    }

    /* ── Video cards ── */
    .vt-cards {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .vt-card {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .vt-card video {
      width: 100%;
      display: block;
    }
    .vt-card-info {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .vt-card-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .vt-card-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .vt-card-name {
      font-family: 'Heebo', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .vt-card-biz {
      font-size: 0.82rem;
      color: rgba(37,46,98,0.55);
    }

    /* ── CTA ── */
    .vt-cta {
      display: block;
      text-align: center;
      margin-top: 36px;
      padding: 14px 24px;
      background: linear-gradient(135deg, #25D366 0%, #1aaf52 100%);
      color: var(--white);
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 12px;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(37,211,102,0.3);
    }
  </style>
</head>
<body>

  <header class="vt-header">
    <a href="index.html" class="vt-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      חזרה
    </a>
    <img src="logo-03.png" alt="חכמת האוטומציה" class="vt-logo">
  </header>

  <div class="vt-container">

    <h1 class="vt-title">המלצות וידאו</h1>
    <p class="vt-subtitle">לקוחות אמיתיים מספרים על החוויה שלהם</p>

    <div class="vt-cards">

      <div class="vt-card">
        <video controls preload="metadata">
          <source src="video1.mp4" type="video/mp4">
        </video>
        <div class="vt-card-info">
          <div class="vt-card-text">
            <span class="vt-card-name">נורית שני</span>
            <span class="vt-card-biz">עמותת דמיון נובע</span>
          </div>
        </div>
      </div>

      <div class="vt-card">
        <video controls preload="metadata">
          <source src="video2.mp4" type="video/mp4">
        </video>
        <div class="vt-card-info">
          <div class="vt-card-text">
            <span class="vt-card-name">שי עובדיה</span>
            <span class="vt-card-biz">מאמן מנטלי למקצועות הטיפול</span>
          </div>
        </div>
      </div>

    </div>

    <a href="https://wa.me/972546242468?text=%D7%94%D7%99%D7%99%20%D7%90%D7%A8%D7%99%D7%90%D7%9C%2C%20%D7%A8%D7%90%D7%99%D7%AA%D7%99%20%D7%90%D7%AA%20%D7%94%D7%94%D7%9E%D7%9C%D7%A6%D7%95%D7%AA%20%D7%95%D7%90%D7%A9%D7%9E%D7%97%20%D7%9C%D7%A9%D7%9E%D7%95%D7%A2%20%D7%A2%D7%95%D7%93" target="_blank" rel="noopener" class="vt-cta">
      רוצה תוצאה דומה? שלח הודעה בוואטסאפ
    </a>

  </div>

</body>
</html>
